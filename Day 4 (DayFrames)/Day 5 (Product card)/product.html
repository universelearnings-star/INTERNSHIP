<!DOCTYPE html>
<html>

<head>
    <title>Product Card</title>
    <link rel="stylesheet" href="style.css">

    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

</head>

<body>

    <header class="navbar">
        <div class="nav-title">Elegance Boutique</div>
        <div class="nav-subtitle">Curated collections for refined tastes</div>
    </header>

    <div class="products-wrapper">

        <div class="product-card" data-rating="4.5" data-reviews="2348">

            <div class="product-image">
                <img src="clenser.jpg" alt="Product">
            </div>

            <div class="product-info">

                <h2 class="product-name">
                    Hydrating Facial Cleanser
                </h2>

                <div class="rating-price">

                    <div class="rating-section">

                        <div class="stars" data-product-id="0">
                            <i class="fas fa-star"></i>
                            <i class="fas fa-star"></i>
                            <i class="fas fa-star"></i>
                            <i class="fas fa-star"></i>
                            <i class="fas fa-star-half-alt"></i>
                        </div>

                        <div class="review-controls">
                            <button class="review-btn review-minus" data-product-id="0">−</button>
                            <p class="reviews" data-product-id="0">2,348 Reviews</p>
                            <button class="review-btn review-plus" data-product-id="0">+</button>
                        </div>

                    </div>

                    <div class="price">
                        ₹799
                    </div>

                </div>

                <button id="cartBtn" class="cartBtn">
                    <i class="fas fa-shopping-cart"></i>
                    Add to Cart
                </button>

            </div>

        </div>

        <div class="product-card" data-rating="4.5" data-reviews="1124">

            <div class="product-image">
                <img src="serum.jpg" alt="Product">
            </div>

            <div class="product-info">

                <h2 class="product-name">
                    Brightening Vitamin C Serum
                </h2>

                <div class="rating-price">

                    <div class="rating-section">

                        <div class="stars" data-product-id="1">
                            <i class="fas fa-star"></i>
                            <i class="fas fa-star"></i>
                            <i class="fas fa-star"></i>
                            <i class="fas fa-star"></i>
                            <i class="fas fa-star-half-alt"></i>
                        </div>

                        <div class="review-controls">
                            <button class="review-btn review-minus" data-product-id="1">−</button>
                            <p class="reviews" data-product-id="1">1,124 Reviews</p>
                            <button class="review-btn review-plus" data-product-id="1">+</button>
                        </div>

                    </div>

                    <div class="price">
                        ₹1,299
                    </div>

                </div>

                <button id="cartBtn2" class="cartBtn">
                    <i class="fas fa-shopping-cart"></i>
                    Add to Cart
                </button>

            </div>

        </div>

        <div class="product-card" data-rating="4.5" data-reviews="3540">

            <div class="product-image">
                <img src="dress.jpg" alt="Product">
            </div>

            <div class="product-info">

                <h2 class="product-name">
                    Summer Dress
                </h2>

                <div class="rating-price">

                    <div class="rating-section">

                        <div class="stars" data-product-id="2">
                            <i class="fas fa-star"></i>
                            <i class="fas fa-star"></i>
                            <i class="fas fa-star"></i>
                            <i class="fas fa-star"></i>
                            <i class="fas fa-star-half-alt"></i>
                        </div>

                        <div class="review-controls">
                            <button class="review-btn review-minus" data-product-id="2">−</button>
                            <p class="reviews" data-product-id="2">3,540 Reviews</p>
                            <button class="review-btn review-plus" data-product-id="2">+</button>
                        </div>

                    </div>

                    <div class="price">
                        ₹2,499
                    </div>

                </div>

                <button id="cartBtn3" class="cartBtn">
                    <i class="fas fa-shopping-cart"></i>
                    Add to Cart
                </button>

            </div>

        </div>

        <div class="product-card" data-rating="4.5" data-reviews="890">

            <div class="product-image">
                <img src="heels.jpg" alt="Product">
            </div>

            <div class="product-info">

                <h2 class="product-name">
                    Elegant Stiletto Heels
                </h2>

                <div class="rating-price">

                    <div class="rating-section">

                        <div class="stars" data-product-id="3">
                            <i class="fas fa-star"></i>
                            <i class="fas fa-star"></i>
                            <i class="fas fa-star"></i>
                            <i class="fas fa-star"></i>
                            <i class="fas fa-star-half-alt"></i>
                        </div>

                        <div class="review-controls">
                            <button class="review-btn review-minus" data-product-id="3">−</button>
                            <p class="reviews" data-product-id="3">890 Reviews</p>
                            <button class="review-btn review-plus" data-product-id="3">+</button>
                        </div>

                    </div>

                    <div class="price">
                        ₹3,199
                    </div>

                </div>

                <button id="cartBtn4" class="cartBtn">
                    <i class="fas fa-shopping-cart"></i>
                    Add to Cart
                </button>

            </div>

        </div>

    </div>

    <script src="product.js"></script>

</body>

</html>
